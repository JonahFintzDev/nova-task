name: nova-task-dev
services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
      POSTGRES_DB: ${POSTGRES_DB:-nova_task}
    ports:
      - '5433:5432'
    volumes:
      - nova-task-postgres-dev:/var/lib/postgresql/data
    networks:
      - nova-task
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    ports:
      - '3001:3000'
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-dev}@postgres:5432/${POSTGRES_DB:-nova_task}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_me}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY}
      PORT: '3000'
      NODE_ENV: development
    volumes:
      - ./api/src:/app/src
      - ./api/prisma:/app/prisma
      - ./api/prisma.config.ts:/app/prisma.config.ts
      - ./api/package.json:/app/package.json
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nova-task

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dev
    ports:
      - '8080:8080'
    environment:
      VITE_API_URL: http://localhost:3001
    volumes:
      - ./dashboard/src:/app/src
      - ./dashboard/index.html:/app/index.html
      - ./dashboard/public:/app/public
    depends_on:
      - api
    networks:
      - nova-task

volumes:
  nova-task-postgres-dev:
    name: nova-task-postgres-dev

networks:
  nova-task:
